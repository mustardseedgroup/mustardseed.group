<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sora and the expanding model stack</title>
  <desc id="desc">Video generation shows that AI is becoming a stack of capabilities, not a single product category.</desc>
  
  <defs>
    <radialGradient id="glow" cx="26%" cy="65%" r="80%">
      <stop offset="0%" stop-color="#ef5da8" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#e7ecff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e7ecff"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.056999999999999995"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#e7ecff"/>
