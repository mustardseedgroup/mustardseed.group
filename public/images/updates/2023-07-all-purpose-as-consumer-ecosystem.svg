<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">All Purpose as consumer ecosystem</title>
  <desc id="desc">Consumer products connected by performance and culture</desc>
  
  <defs>
    <radialGradient id="glow" cx="68%" cy="70%" r="80%">
      <stop offset="0%" stop-color="#8a63ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f6e7ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f6e7ff"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.77" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#f6e7ff"/>
      <circle cx="353" cy="195" r="360" fill="#8a63ff" opacity="0.42"/>
      <circle cx="956" cy="436" r="330" fill="#ef5da8" opacity="0.26"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.54"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.8"/>
  
      <rect x="74" y="74" width="1052" height="482" rx="44" fill="url(#glow)" filter="url(#shadow)"/>
      <rect x="180" y="130" width="278" height="352" rx="48" fill="#fbfaf7" opacity="0.92"/>
      <circle cx="314" cy="306" r="84" fill="#ef5da8" opacity="0.88"/>
      <rect x="532" y="168" width="470" height="86" rx="43" fill="#11110f" opacity="0.9"/>
      <rect x="532" y="292" width="360" height="86" rx="43" fill="#8a63ff" opacity="0.82"/>
      <rect x="532" y="416" width="430" height="46" rx="23" fill="#fbfaf7" opacity="0.82"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ef5da8">MSG</text>
    </g>
</svg>
