<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Culture, media and product thinking</title>
  <desc id="desc">Culture as a serious product surface</desc>
  
  <defs>
    <radialGradient id="glow" cx="46%" cy="25%" r="80%">
      <stop offset="0%" stop-color="#8a63ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f6e7ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f6e7ff"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.056999999999999995"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#f6e7ff"/>
      <circle cx="231" cy="142" r="360" fill="#8a63ff" opacity="0.42"/>
      <circle cx="923" cy="475" r="330" fill="#ef5da8" opacity="0.26"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.54"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.8"/>
  
      <rect x="90" y="80" width="1020" height="470" rx="38" fill="#11110f" filter="url(#shadow)"/>
      <circle cx="256" cy="216" r="110" fill="#8a63ff"/>
      <circle cx="458" cy="412" r="136" fill="#ef5da8" opacity="0.9"/>
      <rect x="672" y="142" width="310" height="344" rx="42" fill="#fbfaf7"/>
      <path d="M718 364 C798 284 864 430 946 324" stroke="#ef5da8" stroke-width="10" fill="none"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#ef5da8">MSG</text>
    </g>
</svg>
