<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Small products, compounding learning</title>
  <desc id="desc">Small products as learning machines</desc>
  
  <defs>
    <radialGradient id="glow" cx="29%" cy="54%" r="80%">
      <stop offset="0%" stop-color="#3977ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#e8e6df" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.069"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#e8e6df"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
      <rect x="118" y="86" width="964" height="458" rx="0" fill="#fbfaf7" stroke="#c8c3b7" filter="url(#shadow)"/>
      <path d="M600 128 V502 M236 315 H964" stroke="#0b0b09" stroke-width="4" opacity="0.42"/>
      <rect x="236" y="164" width="180" height="112" rx="0" fill="#c69386" opacity="0.78"/>
      <rect x="784" y="164" width="180" height="112" rx="0" fill="#3977ff" opacity="0.78"/>
      <rect x="236" y="354" width="180" height="112" rx="0" fill="#11110f" opacity="0.9"/>
      <rect x="784" y="354" width="180" height="112" rx="0" fill="#fbfaf7" stroke="#0b0b09" stroke-width="4"/>
      <circle cx="600" cy="315" r="74" fill="#fbfaf7" stroke="#c69386" stroke-width="6"/>
    
  
    <g transform="translate(990 486)">
