<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AlphaGo and the public imagination</title>
  <desc id="desc">AlphaGo made machine intelligence feel strategic, not merely statistical.</desc>
  
  <defs>
