<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Resilience, tools and execution</title>
  <desc id="desc">Year-end note on resilience and execution</desc>
  
  <defs>
    <radialGradient id="glow" cx="48%" cy="27%" r="80%">
      <stop offset="0%" stop-color="#3977ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f4edde" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f4edde"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.77" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#f4edde"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
    <rect x="110" y="104" width="300" height="206" rx="30" fill="#fbfaf7" stroke="#c8c3b7" filter="url(#shadow)"/>
    <rect x="454" y="244" width="300" height="206" rx="30" fill="#11110f" filter="url(#shadow)"/>
    <rect x="798" y="126" width="300" height="206" rx="30" fill="#3977ff" filter="url(#shadow)"/>
    <path d="M260 310 C400 400 460 274 604 346 S864 400 948 332" fill="none" stroke="#f2b84b" stroke-width="8"/>
    <circle cx="260" cy="310" r="18" fill="#f2b84b"/><circle cx="604" cy="346" r="18" fill="#fbfaf7"/><circle cx="948" cy="332" r="18" fill="#0b0b09"/>
  
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#f2b84b">MSG</text>
    </g>
</svg>
