<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Relaunching the public institutional surface</title>
  <desc id="desc">Mustardseed.group as the public institutional surface</desc>
  
  <defs>
    <radialGradient id="glow" cx="60%" cy="-31%" r="80%">
      <stop offset="0%" stop-color="#f2b84b" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f4f0e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f4f0e8"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.79" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#f4f0e8"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
      <rect x="116" y="94" width="968" height="442" rx="34" fill="#11110f" filter="url(#shadow)"/>
      <rect x="188" y="154" width="318" height="322" rx="32" fill="#fbfaf7"/>
      <path d="M600 128 V502" stroke="#fbfaf7" stroke-width="5" stroke-dasharray="18 18" opacity="0.66"/>
      <circle cx="792" cy="314" r="128" fill="#f2b84b" opacity="0.88"/>
      <circle cx="914" cy="314" r="58" fill="#0b0b09" opacity="0.94"/>
      <path d="M240 258 H430 M240 326 H374" stroke="#0b0b09" stroke-width="14" stroke-linecap="round" opacity="0.66"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#0b0b09">MSG</text>
    </g>
</svg>
