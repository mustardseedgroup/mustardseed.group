<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Public examples, protected systems</title>
  <desc id="desc">Safe public examples without exposing protected implementation</desc>
  
  <defs>
    <radialGradient id="glow" cx="30%" cy="4%" r="80%">
      <stop offset="0%" stop-color="#f2b84b" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f4f0e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f4f0e8"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.79" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#f4f0e8"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
    <rect x="110" y="94" width="980" height="442" rx="34" fill="#fbfaf7" stroke="#c8c3b7" filter="url(#shadow)"/>
    <rect x="166" y="150" width="332" height="276" rx="30" fill="#11110f"/>
    <rect x="704" y="150" width="332" height="276" rx="30" fill="#f2b84b" opacity="0.9"/>
    <path d="M600 118 V512" stroke="#0b0b09" stroke-width="6" stroke-dasharray="16 20"/>
    <path d="M236 284 H428 M776 284 H968" stroke="#fbfaf7" stroke-width="10" stroke-linecap="round"/>
    <circle cx="600" cy="314" r="54" fill="#fbfaf7" stroke="#0b0b09" stroke-width="6"/>
  
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#0b0b09">MSG</text>
    </g>
</svg>
