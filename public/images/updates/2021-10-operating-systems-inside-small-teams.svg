<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Operating systems inside small teams</title>
  <desc id="desc">Small teams needing shared control surfaces</desc>
  
  <defs>
    <radialGradient id="glow" cx="34%" cy="15%" r="80%">
      <stop offset="0%" stop-color="#7ccf78" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#edf2e6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#edf2e6"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
