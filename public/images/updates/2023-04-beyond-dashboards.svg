<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Beyond dashboards</title>
  <desc id="desc">Businesses needing execution systems, not only dashboards</desc>
  
  <defs>
    <radialGradient id="glow" cx="44%" cy="-18%" r="80%">
      <stop offset="0%" stop-color="#3977ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#e8e6df" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.83" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#e8e6df"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
      <rect x="80" y="72" width="1040" height="486" rx="42" fill="#11110f" filter="url(#shadow)"/>
      <path d="M180 460 C320 214 462 454 600 250 S842 174 1020 396" stroke="#3977ff" stroke-width="8" fill="none"/>
      <circle cx="260" cy="246" r="74" fill="#c69386"/><circle cx="600" cy="250" r="94" fill="#fbfaf7"/><circle cx="940" cy="382" r="74" fill="#3977ff"/>
      <path d="M260 246 H600 H940" stroke="#fbfaf7" stroke-width="4" opacity="0.42"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#c69386">MSG</text>
    </g>
</svg>
