<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Culture as a capability system</title>
  <desc id="desc">Music, media and creative output as systems</desc>
  
  <defs>
    <radialGradient id="glow" cx="45%" cy="-20%" r="80%">
      <stop offset="0%" stop-color="#8a63ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f6e7ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f6e7ff"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.74" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#f6e7ff"/>
      <circle cx="370" cy="60" r="360" fill="#8a63ff" opacity="0.42"/>
      <circle cx="532" cy="245" r="330" fill="#ef5da8" opacity="0.26"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.54"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.8"/>
  
    <rect x="72" y="72" width="1056" height="486" rx="42" fill="url(#glow)"/>
    <circle cx="246" cy="230" r="108" fill="#ef5da8" opacity="0.84"/>
    <rect x="470" y="118" width="212" height="284" rx="36" fill="#fbfaf7" stroke="#c8c3b7" filter="url(#shadow)"/>
    <rect x="720" y="214" width="280" height="194" rx="40" fill="#11110f" filter="url(#shadow)"/>
    <path d="M150 442 C276 314 390 512 520 402 S750 312 990 468" fill="none" stroke="#8a63ff" stroke-width="12" opacity="0.84"/>
    <circle cx="872" cy="308" r="48" fill="#fbfaf7"/><path d="M856 286 V334 L900 310Z" fill="#ef5da8"/>
  
  
