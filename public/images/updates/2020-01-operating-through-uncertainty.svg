<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Operating through uncertainty</title>
  <desc id="desc">Systems that hold up under uncertainty</desc>
  
  <defs>
    <radialGradient id="glow" cx="27%" cy="-36%" r="80%">
      <stop offset="0%" stop-color="#3977ff" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#f4edde" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f4edde"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.76" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
    </filter>
  </defs>
  
    <rect width="1200" height="630" fill="#f4edde"/>
    <rect width="1200" height="630" fill="url(#glow)" opacity="0.74"/>
    <rect width="1200" height="630" filter="url(#grain)" opacity="0.66"/>
  
      <rect x="80" y="70" width="1040" height="490" rx="42" fill="url(#glow)" filter="url(#shadow)"/>
      <rect x="132" y="132" width="236" height="132" rx="30" fill="#11110f" opacity="0.9"/><rect x="462" y="132" width="236" height="132" rx="30" fill="#fbfaf7" opacity="0.92"/><rect x="792" y="132" width="236" height="132" rx="30" fill="#11110f" opacity="0.9"/><rect x="132" y="322" width="236" height="132" rx="30" fill="#fbfaf7" opacity="0.92"/><rect x="462" y="322" width="236" height="132" rx="30" fill="#11110f" opacity="0.9"/><rect x="792" y="322" width="236" height="132" rx="30" fill="#fbfaf7" opacity="0.92"/>
      <path d="M250 264 C390 112 502 420 650 286 S860 152 994 324" stroke="#f2b84b" stroke-width="8" fill="none"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#f2b84b">MSG</text>
    </g>
</svg>
