<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The portfolio instinct</title>
  <desc id="desc">The beginning of a multi-domain portfolio mindset</desc>
  
  <defs>
    <radialGradient id="glow" cx="39%" cy="13%" r="80%">
      <stop offset="0%" stop-color="#0b0b09" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#e8e6df" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8e6df"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
