<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Interface control and agent ideas</title>
  <desc id="desc">Interfaces as the operating surface for agentic systems</desc>
  
  <defs>
    <radialGradient id="glow" cx="52%" cy="68%" r="80%">
      <stop offset="0%" stop-color="#ff4f64" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#edf0f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#edf0f6"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.81" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#0b0b09"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.42"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.7"/>
  
    <rect x="104" y="82" width="992" height="466" rx="40" fill="#11110f" filter="url(#shadow)"/>
    <circle cx="600" cy="315" r="90" fill="#fbfaf7"/>
    <circle cx="600" cy="315" r="32" fill="#3977ff"/>
    <path d="M600 315 H256 M600 315 H944 M600 315 V152 M600 315 V478" stroke="#fbfaf7" stroke-width="5" opacity="0.7"/>
    <circle cx="256" cy="315" r="42" fill="#ff4f64"/>
    <circle cx="944" cy="315" r="42" fill="#3977ff"/>
    <circle cx="600" cy="152" r="32" fill="#7ccf78"/>
    <circle cx="600" cy="478" r="32" fill="#f2b84b"/>
    <path d="M380 206 C450 98 754 98 824 206 M382 424 C454 532 746 532 822 424" fill="none" stroke="#ff4f64" stroke-width="4" stroke-dasharray="12 18"/>
  
  
    <g transform="translate(990 486)">
