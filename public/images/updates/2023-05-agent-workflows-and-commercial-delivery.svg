<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Agent workflows and commercial delivery</title>
  <desc id="desc">Agents as a way to support commercial execution</desc>
  
  <defs>
    <radialGradient id="glow" cx="26%" cy="-35%" r="80%">
      <stop offset="0%" stop-color="#ff4f64" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#edf0f6" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#edf0f6"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.056999999999999995"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#0b0b09"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.42"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.7"/>
  
      <rect x="82" y="74" width="1036" height="482" rx="44" fill="#101014" filter="url(#shadow)"/>
      <rect x="156" y="132" width="318" height="326" rx="34" fill="#fbfaf7"/>
      <rect x="548" y="112" width="474" height="366" rx="38" fill="#3977ff" opacity="0.9"/>
      <path d="M216 218 H398 M216 286 H342 M216 354 H424" stroke="#11110f" stroke-width="15" stroke-linecap="round" opacity="0.72"/>
      <path d="M626 292 H936 M936 292 L890 246 M936 292 L890 338" stroke="#fbfaf7" stroke-width="12" fill="none" stroke-linecap="round"/>
      <circle cx="626" cy="292" r="38" fill="#ff4f64"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#3977ff">MSG</text>
    </g>
</svg>
