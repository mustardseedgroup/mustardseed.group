<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Better models for operators</title>
  <desc id="desc">What language systems could eventually mean for practical work</desc>
  
  <defs>
    <radialGradient id="glow" cx="40%" cy="2%" r="80%">
      <stop offset="0%" stop-color="#ef5da8" stop-opacity="0.42"/>
      <stop offset="48%" stop-color="#e7ecff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e7ecff"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#fbfaf7" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="30" flood-color="#0b0b09" flood-opacity="0.17"/>
    </filter>
    
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.79" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.081"/></feComponentTransfer>
    </filter>
  </defs>
  
      <rect width="1200" height="630" fill="#e7ecff"/>
      <circle cx="305" cy="61" r="360" fill="#ef5da8" opacity="0.42"/>
      <circle cx="622" cy="198" r="330" fill="#3977ff" opacity="0.26"/>
      <rect width="1200" height="630" fill="url(#glow)" opacity="0.54"/>
      <rect width="1200" height="630" filter="url(#grain)" opacity="0.8"/>
  
      <rect x="76" y="68" width="1048" height="494" rx="0" fill="url(#glow)" filter="url(#shadow)"/>
      <circle cx="314" cy="314" r="138" fill="#fbfaf7" opacity="0.86"/>
      <circle cx="608" cy="314" r="138" fill="#3977ff" opacity="0.58"/>
      <circle cx="892" cy="314" r="138" fill="#ef5da8" opacity="0.62"/>
      <path d="M184 314 H1020 M314 176 V452 M608 176 V452 M892 176 V452" stroke="#0b0b09" stroke-width="3" opacity="0.38"/>
    
  
    <g transform="translate(990 486)">
      <rect width="110" height="74" rx="0" fill="#fbfaf7" stroke="#c8c3b7" stroke-width="2"/>
      <text x="22" y="48" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="#3977ff">MSG</text>
    </g>
</svg>
